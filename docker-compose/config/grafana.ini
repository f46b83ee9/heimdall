[server]
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[auth]
oauth_auto_login = false

[auth.generic_oauth]
enabled = true
name = Dex
allow_sign_up = true
client_id = grafana
client_secret = ZXhhbXBsZS1hcHAtc2VjcmV0
scopes = openid profile email offline_access
auth_url = http://localhost:5556/dex/auth
token_url = http://dex:5556/dex/token
api_url = http://dex:5556/dex/userinfo
role_attribute_path = (email == 'admin@example.com' || Email == 'admin@example.com') && 'GrafanaAdmin' || 'Editor'
allow_assign_grafana_admin = true
forward_oauth_identity = true
use_refresh_token = true

[explore]
enabled = true

[auth]
token_rotation_interval_minutes = 10
oauth_skip_org_role_update_sync = false

[log]
level = debug